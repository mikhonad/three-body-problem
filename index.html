<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Задача трёх тел</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><defs><radialGradient id='s' cx='.5' cy='.5' r='.5'><stop offset='0' stop-color='%23fffff0'/><stop offset='.3' stop-color='%23fff096'/><stop offset='.7' stop-color='%23ffc83c' stop-opacity='.95'/><stop offset='1' stop-color='%23ffa014' stop-opacity='.8'/></radialGradient><radialGradient id='g' cx='.5' cy='.5' r='.5'><stop offset='0' stop-color='%23ffdc50' stop-opacity='.9'/><stop offset='.4' stop-color='%23ff7814' stop-opacity='.3'/><stop offset='1' stop-color='%23ff3200' stop-opacity='0'/></radialGradient></defs><rect width='64' height='64' fill='%23000'/><g><circle cx='32' cy='14' r='14' fill='url(%23g)'/><circle cx='32' cy='14' r='6' fill='url(%23s)'/><circle cx='14' cy='44' r='14' fill='url(%23g)'/><circle cx='14' cy='44' r='6' fill='url(%23s)'/><circle cx='50' cy='44' r='14' fill='url(%23g)'/><circle cx='50' cy='44' r='6' fill='url(%23s)'/></g></svg>">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Segoe UI', Arial, sans-serif; }
        canvas { display: block; width: 100%; height: 100%; touch-action: none; -webkit-user-select: none; user-select: none; }
        #btns {
            position: fixed; bottom: 56px; left: 50%; transform: translateX(-50%);
            display: flex; z-index: 10;
            opacity: 1; transition: opacity 0.6s ease;
        }
        #btns.hidden { opacity: 0; pointer-events: none; }
        #btns button {
            width: 150px; height: 150px; border: none; border-radius: 50%;
            background: rgba(255,200,100,.18); color: rgba(255,200,100,.9);
            font-size: 64px; cursor: pointer; touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            display: flex; align-items: center; justify-content: center;
            margin: 0 24px;  /* fallback for flex gap (Safari <14.1) */
        }
        #btns button:active { background: rgba(255,200,100,.4); }
        @media (max-width: 1600px) {
            #btns { bottom: 36px; }
            #btns button { width: 94px; height: 94px; font-size: 38px; margin: 0 13px; }
        }
        @media (max-width: 1024px) {
            #btns { bottom: 26px; }
            #btns button { width: 64px; height: 64px; font-size: 28px; margin: 0 8px; }
        }
        @media (max-width: 768px) {
            #btns { bottom: 22px; }
            #btns button { width: 58px; height: 58px; font-size: 24px; margin: 0 5px; }
        }
        @media (max-width: 480px) {
            #btns { bottom: 18px; }
            #btns button { width: 50px; height: 50px; font-size: 20px; margin: 0 3px; }
        }
        @media (max-width: 380px) {
            #btns { bottom: 14px; }
            #btns button { width: 44px; height: 44px; font-size: 18px; margin: 0 2px; }
        }

        /* Menu overlay */
        #menu {
            position: fixed; top: 0; right: 0; bottom: 0; left: 0; z-index: 100;
            background: radial-gradient(ellipse at center, #1a0a00 0%, #000 70%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: rgba(255,220,150,.9); padding: 20px;
        }
        #menu.hidden { display: none; }
        #menu h1 {
            font-size: clamp(32px, 5vw, 80px); font-weight: 300;
            letter-spacing: 4px; margin-bottom: 50px; text-align: center;
            color: rgba(255,220,100,.9);
            text-shadow: 0 0 30px rgba(255,150,50,.6);
        }
        #menu .row {
            display: flex; align-items: center;
            margin: 20px 0; font-size: clamp(18px, 1.8vw, 32px);
        }
        /* margin-based spacing (works on all browsers incl. old Safari) */
        #menu .row > * + * { margin-left: 24px; }
        #menu label { min-width: 140px; text-align: right; color: rgba(255,200,100,.8); }
        #menu input[type=number] {
            width: 100px; padding: 12px; font-size: inherit;
            background: rgba(255,200,100,.1); color: #fff;
            border: 1px solid rgba(255,200,100,.3); border-radius: 8px;
            text-align: center;
        }
        #menu input[type=range] {
            width: clamp(220px, 26vw, 420px); height: 10px; accent-color: #ffaa40;
        }
        #menu .val {
            min-width: 70px; color: #fff; font-size: 1.1em;
            -moz-appearance: textfield;
        }
        #menu .val::-webkit-outer-spin-button,
        #menu .val::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        #menu .startBtn {
            margin-top: 46px; padding: 22px 80px;
            font-size: clamp(22px, 2.4vw, 40px); letter-spacing: 5px;
            background: rgba(255,180,60,.2); color: #ffeab0;
            border: 1px solid rgba(255,200,100,.5); border-radius: 60px;
            cursor: pointer; touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }
        #menu .startBtn:hover, #menu .startBtn:active {
            background: rgba(255,200,100,.35); color: #fff;
        }
        #menu .sig {
            position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%);
            font-size: clamp(12px, 1vw, 18px); letter-spacing: 2px;
            color: rgba(255,200,100,.4); font-weight: 300;
        }

        /* Mobile: shrink menu by ~1.5x so it fits narrow screens */
        @media (max-width: 640px) {
            #menu h1 {
                font-size: clamp(22px, 5.5vw, 36px);
                letter-spacing: 2px; margin-bottom: 32px;
            }
            #menu .row {
                margin: 12px 0; font-size: 14px;
            }
            #menu .row > * + * { margin-left: 12px; }
            #menu label { min-width: 60px; }
            #menu input[type=number] { width: 60px; padding: 7px; }
            #menu input[type=range] {
                width: clamp(130px, 40vw, 200px); height: 8px;
            }
            #menu .val { min-width: 30px; font-size: 1em; }
            #menu .startBtn {
                margin-top: 28px; padding: 12px 40px;
                font-size: 16px; letter-spacing: 3px;
                border-radius: 40px;
            }
            #menu .sig {
                font-size: 10px; bottom: 16px; letter-spacing: 1px;
            }
        }

        /* Desktop menu — modestly larger than mobile, not oversized */
        @media (min-width: 1024px) {
            #menu h1 {
                font-size: clamp(40px, 4vw, 72px);
                letter-spacing: 5px; margin-bottom: 50px;
                text-shadow: 0 0 30px rgba(255,150,50,.6);
            }
            #menu .row {
                margin: 18px 0;
                font-size: clamp(18px, 1.6vw, 28px);
            }
            #menu .row > * + * { margin-left: 28px; }
            #menu label { min-width: 150px; }
            #menu input[type=number] {
                width: 110px; padding: 12px;
                border-radius: 10px;
            }
            #menu input[type=range] {
                width: clamp(280px, 30vw, 480px); height: 14px;
            }
            #menu .val { min-width: 80px; }
            #menu .startBtn {
                margin-top: 50px; padding: 20px 80px;
                font-size: clamp(22px, 2vw, 36px);
                letter-spacing: 6px; border-radius: 60px;
            }
            #menu .sig {
                font-size: clamp(14px, 1vw, 20px);
                bottom: 30px; letter-spacing: 2px;
            }
        }
    </style>
</head>
<body>
<canvas id="c"></canvas>

<div id="menu">
    <h1>THE THREE-BODY PROBLEM</h1>
    <div class="row">
        <label for="sStars">Stars</label>
        <input type="range" id="sStars" min="1" max="500" value="3">
        <input type="number" id="vStars" min="1" max="500" value="3" class="val">
    </div>
    <div class="row">
        <label for="sPlanets">Planets</label>
        <input type="range" id="sPlanets" min="0" max="2000" value="1">
        <input type="number" id="vPlanets" min="0" max="2000" value="1" class="val">
    </div>
    <button class="startBtn" onclick="startSim()">START</button>
    <div class="sig">Created by Mikhail Nikitin</div>
</div>

<div id="btns">
    <button onclick="ctl('slower')" title="Slower">&#9664;</button>
    <button onclick="ctl('pause')" title="Pause">&#10074;&#10074;</button>
    <button onclick="ctl('faster')" title="Faster">&#9654;</button>
    <button onclick="ctl('restart')" title="Restart">&#8635;</button>
    <button onclick="ctl('fullscreen')" title="Fullscreen">&#9974;</button>
    <button onclick="ctl('menu')" title="Menu">&#9776;</button>
</div>
<script>
(() => {
    const C = document.getElementById('c'), X = C.getContext('2d');
    const G = 2000000, SSQ = 900, BR = 14, STAR_MULT = 2, SUBS = 4, TLEN = 50;
    const FPS = 30, FRAME_MS = 1000 / FPS;

    let bodies, lastT = 0, tScale = 2, restartT = null, lastFrame = 0;

    // --- Planet color palettes ---
    // Each palette: [glowR,G,B, coreLight, coreMid, coreDark, trailR, trailG, trailB]
    const PLANET_PALETTES = [
        { name: 'blue',    glow: [100, 140, 200], core: ['#c8dcff', 'rgba(140,170,210,.95)', 'rgba(100,130,180,.8)'], trail: [100, 140, 200] },
        { name: 'emerald', glow: [80, 200, 140],  core: ['#c8ffd8', 'rgba(100,200,140,.95)', 'rgba(60,160,100,.8)'],  trail: [80, 200, 140] },
        { name: 'mars',    glow: [220, 100, 60],  core: ['#ffd8c0', 'rgba(220,130,90,.95)',  'rgba(180,80,40,.8)'],   trail: [220, 100, 60] },
        { name: 'violet',  glow: [180, 120, 220], core: ['#e8d0ff', 'rgba(190,140,220,.95)', 'rgba(150,90,200,.8)'],  trail: [180, 120, 220] },
        { name: 'amber',   glow: [230, 190, 80],  core: ['#fff0c0', 'rgba(240,200,100,.95)', 'rgba(200,160,60,.8)'],  trail: [230, 190, 80] },
        { name: 'teal',    glow: [80, 200, 200],  core: ['#c0fff0', 'rgba(100,220,210,.95)', 'rgba(60,180,180,.8)'],  trail: [80, 200, 200] },
        { name: 'rose',    glow: [230, 120, 150], core: ['#ffd0e0', 'rgba(230,140,170,.95)', 'rgba(200,90,130,.8)'],  trail: [230, 120, 150] },
        { name: 'ice',     glow: [190, 220, 240], core: ['#f0f8ff', 'rgba(200,225,245,.95)', 'rgba(160,190,220,.8)'], trail: [190, 220, 240] },
    ];

    // Trail colors: stars (shared) + per-palette planets
    const sCol = [];
    const pTrailCols = PLANET_PALETTES.map(() => []);
    for (let i = 0; i < TLEN; i++) {
        const t = 1 - i / TLEN;
        sCol[i] = `rgb(${255 * t | 0},${160 * t | 0},${20 * t | 0})`;
        for (let p = 0; p < PLANET_PALETTES.length; p++) {
            const [r, g, b] = PLANET_PALETTES[p].trail;
            pTrailCols[p][i] = `rgb(${r * t | 0},${g * t | 0},${b * t | 0})`;
        }
    }

    // Sprite cache (2x resolution for smooth look)
    const SC = {}, SPR_SCALE = 2;
    function spr(r, s, paletteIdx) {
        // Cache key includes palette for planets
        const k = (s ? 's' : 'p' + (paletteIdx | 0) + '_') + (r * 10 | 0);
        if (SC[k]) return SC[k];
        const gm = s ? 3 : 1.3, gr = r * gm;
        const sz = ((gr * 2 + 4) * SPR_SCALE) | 0;
        const o = document.createElement('canvas'); o.width = o.height = sz;
        const g = o.getContext('2d'), cx = sz / 2;
        const R = r * SPR_SCALE, GR = gr * SPR_SCALE;
        if (s) {
            const l = g.createRadialGradient(cx, cx, R * .3, cx, cx, GR);
            l.addColorStop(0, 'rgba(255,220,80,.9)'); l.addColorStop(.15, 'rgba(255,180,40,.6)');
            l.addColorStop(.4, 'rgba(255,120,20,.2)'); l.addColorStop(.7, 'rgba(255,80,10,.05)');
            l.addColorStop(1, 'rgba(255,50,0,0)');
            g.fillStyle = l; g.beginPath(); g.arc(cx, cx, GR, 0, 6.283); g.fill();
            const c = g.createRadialGradient(cx, cx, 0, cx, cx, R);
            c.addColorStop(0, '#fffff0'); c.addColorStop(.3, '#fff096');
            c.addColorStop(.7, 'rgba(255,200,60,.95)'); c.addColorStop(1, 'rgba(255,160,20,.8)');
            g.fillStyle = c; g.beginPath(); g.arc(cx, cx, R, 0, 6.283); g.fill();
        } else {
            const pal = PLANET_PALETTES[paletteIdx % PLANET_PALETTES.length];
            const [gR, gG, gB] = pal.glow;
            const l = g.createRadialGradient(cx, cx, R * .2, cx, cx, GR);
            l.addColorStop(0, `rgba(${gR + 50},${gG + 40},${gB + 20},.5)`);
            l.addColorStop(.5, `rgba(${gR},${gG},${gB},.15)`);
            l.addColorStop(1, `rgba(${gR - 20},${gG - 20},${gB - 20},0)`);
            g.fillStyle = l; g.beginPath(); g.arc(cx, cx, GR, 0, 6.283); g.fill();
            const c = g.createRadialGradient(cx, cx, 0, cx, cx, R);
            c.addColorStop(0, pal.core[0]);
            c.addColorStop(.5, pal.core[1]);
            c.addColorStop(1, pal.core[2]);
            g.fillStyle = c; g.beginPath(); g.arc(cx, cx, R, 0, 6.283); g.fill();
        }
        o._drawSize = (gr * 2 + 4);
        SC[k] = o; return o;
    }

    // Supersample: render at 2× resolution, browser scales down → crisp "high-DPR" look
    const SUP = 2;
    function resize() { C.width = innerWidth * SUP; C.height = innerHeight * SUP; }
    addEventListener('resize', resize); resize();

    // --- Controls ---
    let osd = 0, osdText = '';
    function showOSD(txt) { osdText = txt; osd = 60; } // ~2 sec at 30fps

    addEventListener('keydown', e => {
        const k = e.key;
        if (k === 'f' || k === 'F' || k === 'а' || k === 'А')
            toggleFullscreen();
        if (k === 'ArrowUp' || k === '+' || k === '=') doFaster();
        if (k === 'ArrowDown' || k === '-') doSlower();
        if (k === ' ') { e.preventDefault(); doPause(); }
        if (k === 'r' || k === 'R' || k === 'к' || k === 'К') doRestart();
    });

    function toggleFullscreen() {
        const d = document, de = d.documentElement;
        const fsEl = d.fullscreenElement || d.webkitFullscreenElement;
        if (fsEl) {
            (d.exitFullscreen || d.webkitExitFullscreen).call(d);
        } else {
            (de.requestFullscreen || de.webkitRequestFullscreen || de.webkitEnterFullscreen || (() => {})).call(de);
        }
    }

    function doFaster() { tScale *= 1.5; showOSD(tScale.toFixed(1) + 'x'); }
    function doSlower() { tScale = Math.max(tScale / 1.5, 0.1); showOSD(tScale.toFixed(1) + 'x'); }
    function doPause() { tScale = tScale > .01 ? 0 : 2; showOSD(tScale < .01 ? 'PAUSED' : tScale.toFixed(1) + 'x'); }
    function doRestart() { if (restartT) { clearTimeout(restartT); restartT = null; } lastT = 0; tScale = 2; init(); showOSD('RESTART'); }

    // --- Camera: auto-fit all alive bodies + manual scroll zoom + drag pan ---
    let autoCamera = true; // auto-fit mode
    let camCX = 0, camCY = 0, camZoom = 1; // current camera state
    let manualPanX = 0, manualPanY = 0, manualZoom = 1; // manual overrides
    let dr = false, dsx, dsy, psx, psy;

    function toScreen(wx, wy) {
        const z = autoCamera ? camZoom : manualZoom;
        const cx = autoCamera ? camCX : C.width / 2 + manualPanX;
        const cy = autoCamera ? camCY : C.height / 2 + manualPanY;
        return [
            (wx - camWorldX) * z + cx,
            (wy - camWorldY) * z + cy
        ];
    }
    let camWorldX = 0, camWorldY = 0;

    // --- Director-style auto camera ---
    let camFocusIds = null;
    let committedFocus = null; // Array of body refs — stable membership across frames
    let smoothTargetX = 0, smoothTargetY = 0, smoothTargetZoom = 1;
    let smoothMaxDist = 0;
    let smoothInited = false;
    let cameraZoomFloor = null; // ratchet: zoom can only tighten from initial, never widen

    function updateAutoCamera(dt) {
        const allStars = [], allPlanets = [];
        for (let i = 0; i < bodies.length; i++) {
            if (!bodies[i].alive) continue;
            if (bodies[i].star) allStars.push(bodies[i]); else allPlanets.push(bodies[i]);
        }
        const allAlive = allStars.length ? allStars : allPlanets;
        if (!allAlive.length) return;

        // Committed focus contains ONLY STARS — planets don't drive camera target
        // (planets orbit rapidly, would cause target jitter)
        const focusPool = allStars.length ? allStars : allPlanets;

        // Clean up: remove dead bodies
        if (committedFocus) committedFocus = committedFocus.filter(b => b.alive);

        let focus;

        if (!committedFocus || committedFocus.length === 0) {
            // Initial pick from stars only
            if (focusPool.length <= 5) {
                focus = focusPool.slice();
            } else {
                let cx0 = 0, cy0 = 0, cm0 = 0;
                for (const b of focusPool) { cx0 += b.x * b.mass; cy0 += b.y * b.mass; cm0 += b.mass; }
                cx0 /= cm0; cy0 /= cm0;
                const withDist = focusPool.map(b => ({ b, d: Math.sqrt((b.x - cx0) ** 2 + (b.y - cy0) ** 2) }));
                withDist.sort((a, b) => a.d - b.d);
                const keepCount = Math.max(2, Math.ceil(focusPool.length * 0.7));
                focus = withDist.slice(0, keepCount).map(x => x.b);
                for (let pass = 0; pass < 2; pass++) {
                    let tx = 0, ty = 0, tm = 0;
                    for (const b of focus) { tx += b.x * b.mass; ty += b.y * b.mass; tm += b.mass; }
                    const ccx = tx / tm, ccy = ty / tm;
                    const wd = focus.map(b => ({ b, d: Math.sqrt((b.x - ccx) ** 2 + (b.y - ccy) ** 2) }));
                    wd.sort((a, b) => a.d - b.d);
                    const kc = Math.max(2, Math.ceil(focus.length * 0.85));
                    focus = wd.slice(0, kc).map(x => x.b);
                }
            }
            committedFocus = focus.slice();
        } else {
            // LOCK — hysteresis boundary, STARS ONLY
            const viewR = Math.min(C.width, C.height) / (camZoom * 2);
            const removeR = viewR * 1.5, addR = viewR * 0.9;
            const removeSq = removeR * removeR, addSq = addR * addR;

            committedFocus = committedFocus.filter(b => {
                const dx = b.x - camWorldX, dy = b.y - camWorldY;
                return dx * dx + dy * dy < removeSq;
            });

            // Add new STARS that entered view (planets never drive target)
            const committedSet = new Set(committedFocus);
            for (const b of focusPool) {
                if (committedSet.has(b)) continue;
                const dx = b.x - camWorldX, dy = b.y - camWorldY;
                if (dx * dx + dy * dy < addSq) {
                    committedFocus.push(b);
                }
            }

            if (committedFocus.length === 0) {
                let bestD = Infinity, best = null;
                for (const b of focusPool) {
                    const dx = b.x - camWorldX, dy = b.y - camWorldY;
                    const d = dx * dx + dy * dy;
                    if (d < bestD) { bestD = d; best = b; }
                }
                if (best) committedFocus = [best];
            }

            focus = committedFocus;
        }

        // Split focus by type for downstream logic
        stars = focus.filter(b => b.star);
        planets = allPlanets.filter(b => !committedFocus || !committedFocus.includes(b) ? false : true);
        alive = focus;

        camFocusIds = new Set(focus);

        // --- Target position: mass centroid is ALWAYS stable (physics-conserved) ---
        // Use mass-weighted centroid of committed focus — barycenter stays put while bodies orbit
        let targetX, targetY;
        if (focus.length === 1) {
            targetX = focus[0].x; targetY = focus[0].y;
        } else {
            let tmx = 0, tmy = 0, tmw = 0;
            for (const b of focus) { tmx += b.x * b.mass; tmy += b.y * b.mass; tmw += b.mass; }
            targetX = tmx / tmw; targetY = tmy / tmw;
        }

        // Max distance from target to any focus body (for zoom)
        let maxDist = 0;
        for (const b of focus) {
            const d = Math.sqrt((b.x - targetX) ** 2 + (b.y - targetY) ** 2) + b.r * 3;
            if (d > maxDist) maxDist = d;
        }

        // Extend view to include planets ONLY if VERY close to focus (tight orbit planets)
        // Many distant planets were inflating the view unnecessarily
        for (const p of allPlanets) {
            const dpx = p.x - targetX, dpy = p.y - targetY;
            const d = Math.sqrt(dpx * dpx + dpy * dpy);
            // Only include if within current focus radius (tight orbit)
            if (d < maxDist * 1.2) {
                const pd = d + p.r * 2;
                if (pd > maxDist) maxDist = pd;
            }
        }

        // Min view radius
        const screenMin = Math.min(C.width, C.height);
        const orbitRoom = screenMin * 0.14;
        maxDist = Math.max(maxDist, orbitRoom);

        // Asymmetric smoothing: fast grow, very slow shrink
        // This locks view on orbital MAXIMUM, no oscillation with orbital motion
        if (smoothMaxDist === 0) smoothMaxDist = maxDist;
        if (maxDist > smoothMaxDist) {
            smoothMaxDist += (maxDist - smoothMaxDist) * 0.05;  // expand responsively
        } else {
            smoothMaxDist += (maxDist - smoothMaxDist) * 0.0015; // decay very slowly — no wobble
        }

        const isExpanding = camZoom * (2 * smoothMaxDist * 1.4) > screenMin;
        // Padding: 1.25 when settling (tight frame — binary ~35% of screen), 1.6 when spreading
        const paddingFactor = isExpanding ? 1.6 : 1.25;
        const minZoom = 0.05;
        let rawTargetZoom = Math.max(minZoom, Math.min(screenMin / (2 * smoothMaxDist * paddingFactor), 5.0));

        // --- Dynamism blend based on alive body count ---
        const dyn = Math.max(0, Math.min(1, (6 - allAlive.length) / 4));

        // Init on first frame — capture initial zoom as the widest allowed
        if (!smoothInited) {
            smoothTargetX = targetX; smoothTargetY = targetY;
            smoothTargetZoom = rawTargetZoom;
            camWorldX = targetX; camWorldY = targetY;
            cameraZoomFloor = rawTargetZoom;
            smoothInited = true;
        }

        // Ratchet: target zoom can only be tighter (>= floor) than initial view, never wider
        if (cameraZoomFloor !== null && rawTargetZoom < cameraZoomFloor) {
            rawTargetZoom = cameraZoomFloor;
        }

        // Layer 1: smooth target — gentle. Slightly faster zoom response when few bodies
        const smF = 0.03;
        smoothTargetX += (targetX - smoothTargetX) * smF;
        smoothTargetY += (targetY - smoothTargetY) * smF;
        const zSmF = 0.03 + dyn * 0.04; // 0.03 many → 0.07 few
        smoothTargetZoom = Math.exp(Math.log(smoothTargetZoom) + (Math.log(rawTargetZoom) - Math.log(smoothTargetZoom)) * zSmF);

        // Layer 2: camera slowly follows smoothed target
        const dx = smoothTargetX - camWorldX, dy = smoothTargetY - camWorldY;
        const posDelta = Math.sqrt(dx * dx + dy * dy);
        const viewRadius = Math.min(C.width, C.height) / (camZoom * 2);
        const relDelta = posDelta / Math.max(viewRadius, 1);

        // Gentle error correction. Max speed comes only from very large errors
        const posSpeed = 0.005 + Math.min(0.02, relDelta * relDelta * 0.08);

        camWorldX += dx * posSpeed;
        camWorldY += dy * posSpeed;

        // ---- ZOOM ----
        const logTargetZoom = Math.log(smoothTargetZoom);
        const logCam = Math.log(camZoom);
        const zoomErr = logTargetZoom - logCam;
        const zoomingOut = smoothTargetZoom < camZoom;
        // Zoom-in gets faster when few bodies (late evolution): 0.004 → 0.016 at dyn=1
        const zoomGain = zoomingOut ? 0.008 : 0.004 + dyn * 0.012;
        camZoom = Math.exp(logCam + zoomErr * zoomGain);

        camCX = C.width / 2;
        camCY = C.height / 2;
    }

    // When switching from auto to manual, snapshot current auto-camera state exactly
    function switchToManual() {
        if (autoCamera) {
            manualZoom = camZoom;
            // Auto camera renders at screen center, manual also uses screen center + pan
            // So pan=0 keeps the same view
            manualPanX = 0;
            manualPanY = 0;
            autoCamera = false;
        }
    }

    addEventListener('wheel', e => {
        e.preventDefault();
        switchToManual();
        const f = e.deltaY < 0 ? 1.15 : 1 / 1.15;
        const mx = e.clientX * SUP, my = e.clientY * SUP;
        manualPanX = mx - C.width / 2 - (mx - C.width / 2 - manualPanX) * f;
        manualPanY = my - C.height / 2 - (my - C.height / 2 - manualPanY) * f;
        manualZoom = Math.max(manualZoom * f, 0.001);
    }, { passive: false });

    // --- Pointer controls (works for both mouse and touch) ---
    const isTouch = 'ontouchstart' in window;
    let lastTap = 0;

    function resetToAuto() {
        autoCamera = true;
        manualPanX = 0; manualPanY = 0;
        showOSD('AUTO');
    }

    if (!isTouch) {
        // Desktop: mouse drag + dblclick
        C.addEventListener('mousedown', e => { dr = true; dsx = e.clientX * SUP; dsy = e.clientY * SUP; psx = manualPanX; psy = manualPanY; switchToManual(); });
        addEventListener('mousemove', e => { if (!dr) return; manualPanX = psx + e.clientX * SUP - dsx; manualPanY = psy + e.clientY * SUP - dsy; });
        addEventListener('mouseup', () => dr = false);
        C.addEventListener('dblclick', resetToAuto);
    } else {
        // Mobile: touch drag + pinch zoom + double-tap
        let pinchDist = 0, pinchZoom0 = 1;
        let tdsx = 0, tdsy = 0, tpsx = 0, tpsy = 0, dragging1 = false;

        C.addEventListener('touchstart', e => {
            e.preventDefault();
            const t = e.touches;
            if (t.length === 1) {
                const now = Date.now();
                if (now - lastTap < 300) { resetToAuto(); lastTap = 0; return; }
                lastTap = now;
                switchToManual();
                dragging1 = true;
                tdsx = t[0].clientX * SUP; tdsy = t[0].clientY * SUP;
                tpsx = manualPanX; tpsy = manualPanY;
            }
            if (t.length === 2) {
                dragging1 = false;
                switchToManual();
                pinchDist = Math.hypot(t[0].clientX - t[1].clientX, t[0].clientY - t[1].clientY) * SUP;
                pinchZoom0 = manualZoom;
            }
        }, { passive: false });

        C.addEventListener('touchmove', e => {
            e.preventDefault();
            const t = e.touches;
            if (t.length === 1 && dragging1) {
                manualPanX = tpsx + t[0].clientX * SUP - tdsx;
                manualPanY = tpsy + t[0].clientY * SUP - tdsy;
            }
            if (t.length === 2 && pinchDist > 0) {
                const d = Math.hypot(t[0].clientX - t[1].clientX, t[0].clientY - t[1].clientY) * SUP;
                manualZoom = Math.max(pinchZoom0 * (d / pinchDist), 0.001);
            }
        }, { passive: false });

        C.addEventListener('touchend', e => {
            if (e.touches.length === 0) { dragging1 = false; pinchDist = 0; }
            if (e.touches.length === 1) {
                // After pinch ends, restart single-drag from current pos
                pinchDist = 0;
                dragging1 = true;
                tdsx = e.touches[0].clientX * SUP; tdsy = e.touches[0].clientY * SUP;
                tpsx = manualPanX; tpsy = manualPanY;
            }
        });
    }

    // Screen coordinate helpers using current camera
    function sx(wx) {
        const z = autoCamera ? camZoom : manualZoom;
        const cx = autoCamera ? camCX : C.width / 2 + manualPanX;
        return (wx - camWorldX) * z + cx;
    }
    function sy(wy) {
        const z = autoCamera ? camZoom : manualZoom;
        const cy = autoCamera ? camCY : C.height / 2 + manualPanY;
        return (wy - camWorldY) * z + cy;
    }
    function sScale() { return autoCamera ? camZoom : manualZoom; }

    // Current simulation config
    let cfg = { nStars: 3, nPlanets: 1 };

    function init() {
        const nS = Math.max(1, Math.min(500, cfg.nStars | 0));
        const nP = Math.max(0, Math.min(2000, cfg.nPlanets | 0));
        const cx = C.width / 2, cy = C.height / 2;
        // Spread scales slightly with star count but stays compact
        // Spread scales proportionally with star count: more stars need more space
        // 1 star: compact. 2-3 stars: baseline. 10+ stars: wider. 30 stars: very wide.
        const spreadFactor = nS === 1 ? 0.1 : 0.4 + Math.sqrt(nS) * 0.18;
        // Mobile boost: narrower screens have less space, scale up spread to match desktop feel
        const screenMinDim = Math.min(C.width, C.height);
        const mobileBoost = screenMinDim < 600 ? 1.6 : 1;
        const sp = screenMinDim * spreadFactor * mobileBoost;

        bodies = [];
        const ba = Math.random() * 6.283;

        // Place stars
        if (nS === 1) {
            const m = 0.5 + Math.pow(Math.random(), 1.5) * 9.5;
            bodies.push({ x: cx, y: cy, vx: 0, vy: 0, ax: 0, ay: 0, mass: m, r: BR * Math.cbrt(m) * STAR_MULT, star: true, alive: true, trail: [] });
        } else {
            const dMin = 0.25;
            // When many planets, widen star spread up to 3× so planetary systems don't overlap
            const planetBonus = 1 + 2 * Math.min(1, nP / 1500);
            const dMax = (0.6 + Math.sqrt(nS) * 0.275) * planetBonus;

            // --- Random placement topology ---
            // 0: ring (current) — equal angles, random radii
            // 1: uniform disk — fully random position in disk
            // 2: clusters — 2-3 groups
            // 3: spiral — two spiral arms
            // 4: shell — concentric rings
            const placement = Math.floor(Math.random() * 5);
            const positions = [];

            if (placement === 0) {
                // Ring-ish: equal angles, varied radii
                for (let i = 0; i < nS; i++) {
                    const a = ba + (6.283 / nS) * i + (Math.random() - .5) * 0.6;
                    const d = sp * (dMin + Math.random() * (dMax - dMin));
                    positions.push([cx + Math.cos(a) * d, cy + Math.sin(a) * d]);
                }
            } else if (placement === 1) {
                // Uniform disk: random angle + sqrt-radius (uniform area density)
                for (let i = 0; i < nS; i++) {
                    const a = Math.random() * 6.283;
                    const d = sp * (dMin + Math.sqrt(Math.random()) * (dMax - dMin));
                    positions.push([cx + Math.cos(a) * d, cy + Math.sin(a) * d]);
                }
            } else if (placement === 2) {
                // Clusters: 2-3 groups
                const nClusters = 2 + Math.floor(Math.random() * 2);
                const clusterCenters = [];
                for (let c = 0; c < nClusters; c++) {
                    const ca = ba + (6.283 / nClusters) * c;
                    const cd = sp * (dMax * 0.5);
                    clusterCenters.push([cx + Math.cos(ca) * cd, cy + Math.sin(ca) * cd]);
                }
                for (let i = 0; i < nS; i++) {
                    const cen = clusterCenters[i % nClusters];
                    const a = Math.random() * 6.283;
                    const d = sp * Math.random() * dMax * 0.35;
                    positions.push([cen[0] + Math.cos(a) * d, cen[1] + Math.sin(a) * d]);
                }
            } else if (placement === 3) {
                // Spiral: 2 arms
                for (let i = 0; i < nS; i++) {
                    const arm = i % 2;
                    const t = i / nS;
                    const a = ba + arm * Math.PI + t * 6.283 * 1.5 + (Math.random() - .5) * 0.3;
                    const d = sp * (dMin + t * (dMax - dMin)) + (Math.random() - .5) * sp * 0.1;
                    positions.push([cx + Math.cos(a) * d, cy + Math.sin(a) * d]);
                }
            } else {
                // Shells: concentric rings
                const shells = 2 + Math.floor(Math.random() * 3);
                for (let i = 0; i < nS; i++) {
                    const shell = i % shells;
                    const shellR = dMin + (shell + 0.5) / shells * (dMax - dMin);
                    const a = Math.random() * 6.283;
                    const d = sp * (shellR + (Math.random() - .5) * 0.2);
                    positions.push([cx + Math.cos(a) * d, cy + Math.sin(a) * d]);
                }
            }

            // --- Random velocity topology ---
            // 0: tangential (orbital rotation)
            // 1: fully random direction
            // 2: radial (inward/outward rush)
            const velMode = Math.floor(Math.random() * 3);

            for (let i = 0; i < nS; i++) {
                const [px, py] = positions[i];
                const ax = px - cx, ay = py - cy;
                const rr = Math.sqrt(ax * ax + ay * ay) || 1;
                let vx, vy;
                if (velMode === 0) {
                    const dir = Math.random() < 0.5 ? 1 : -1; // random rotation direction
                    vx = -ay / rr * dir + (Math.random() - .5) * 0.3;
                    vy = ax / rr * dir + (Math.random() - .5) * 0.3;
                } else if (velMode === 1) {
                    const ang = Math.random() * 6.283;
                    vx = Math.cos(ang); vy = Math.sin(ang);
                } else {
                    const dir = Math.random() < 0.5 ? 1 : -1;
                    vx = ax / rr * dir + (Math.random() - .5) * 0.4;
                    vy = ay / rr * dir + (Math.random() - .5) * 0.4;
                }
                const m = 0.5 + Math.pow(Math.random(), 1.5) * 9.5;
                bodies.push({
                    x: px, y: py, vx, vy, ax: 0, ay: 0, mass: m,
                    r: BR * Math.cbrt(m) * STAR_MULT, star: true, alive: true, trail: []
                });
            }

            // Zero COM velocity
            let tm = 0, tvx = 0, tvy = 0;
            for (const b of bodies) { tm += b.mass; tvx += b.vx * b.mass; tvy += b.vy * b.mass; }
            for (const b of bodies) { b.vx -= tvx / tm; b.vy -= tvy / tm; }

            // Energy-based velocity scaling: bound system
            let U = 0;
            for (let i = 0; i < bodies.length; i++) for (let j = i + 1; j < bodies.length; j++) {
                const dx = bodies[j].x - bodies[i].x, dy = bodies[j].y - bodies[i].y;
                U -= G * bodies[i].mass * bodies[j].mass / Math.sqrt(dx * dx + dy * dy);
            }
            let KE = 0;
            for (const b of bodies) KE += .5 * b.mass * (b.vx * b.vx + b.vy * b.vy);
            const ratio = 0.2 + Math.random() * 0.5; // wider range: 0.2–0.7
            const s = Math.sqrt(ratio * Math.abs(U) / KE);
            for (const b of bodies) { b.vx *= s; b.vy *= s; }
        }

        // Place planets — each attached to random star on circular orbit
        const stars = bodies.slice(); // snapshot before adding planets
        for (let i = 0; i < nP; i++) {
            const host = stars[Math.floor(Math.random() * stars.length)];
            // Varied orbital distance: 2-25 host radii
            // Orbital spread widens with total planet count (less clustering when many)
            const orbitRange = 23 + Math.sqrt(nP) * 1.8;
            const oR = host.r * (2 + Math.random() * orbitRange);
            const pa = Math.random() * 6.283;
            const ov = Math.sqrt(G * host.mass / oR);
            // Planet mass: Mercury-like to ~2×Jupiter, log-uniform distribution
            const pmMin = 0.00002;   // ~Mercury relative to host
            const pmMax = 0.002;     // ~2×Jupiter relative to host
            const pmFactor = pmMin * Math.pow(pmMax / pmMin, Math.random());
            const pm = host.mass * pmFactor;
            bodies.push({
                x: host.x + Math.cos(pa) * oR, y: host.y + Math.sin(pa) * oR,
                vx: host.vx + Math.cos(pa + 1.5708) * ov,
                vy: host.vy + Math.sin(pa + 1.5708) * ov,
                ax: 0, ay: 0, mass: pm, r: Math.max(2.5, BR * Math.cbrt(pm) * 3.0),
                star: false, alive: true, trail: [],
                palette: Math.floor(Math.random() * PLANET_PALETTES.length)
            });
        }

        // Zero total system momentum (prevents drift through space)
        let totM = 0, totVx = 0, totVy = 0;
        for (const b of bodies) { totM += b.mass; totVx += b.vx * b.mass; totVy += b.vy * b.mass; }
        for (const b of bodies) { b.vx -= totVx / totM; b.vy -= totVy / totM; }

        acc();

        // Reset camera
        autoCamera = true; camWorldX = cx; camWorldY = cy;
        camFocusIds = null; committedFocus = null; smoothInited = false; smoothMaxDist = 0;
        cameraZoomFloor = null;
        flashes = []; activeContacts = new Set();

        // Clear sprite cache — prevents memory buildup from accumulated sprites
        // (radii vary due to merges/different masses across runs)
        for (const key in SC) delete SC[key];
        let maxD = 0;
        for (const b of bodies) { const d = Math.sqrt((b.x - cx) ** 2 + (b.y - cy) ** 2) + b.r * 3; if (d > maxD) maxD = d; }
        camZoom = Math.min(C.width, C.height) / (2 * Math.max(maxD, 50) * 1.3);
    }

    // --- Physics (pure gravity, no barriers) ---
    function acc() {
        for (let i = 0; i < bodies.length; i++) { const b = bodies[i]; if (b.alive) { b.ax = 0; b.ay = 0; } }
        for (let i = 0; i < bodies.length; i++) {
            const a = bodies[i]; if (!a.alive) continue;
            for (let j = i + 1; j < bodies.length; j++) {
                const b = bodies[j]; if (!b.alive) continue;
                const dx = b.x - a.x, dy = b.y - a.y, dSq = dx * dx + dy * dy + SSQ;
                const f = G / (dSq * Math.sqrt(dSq));
                a.ax += f * b.mass * dx; a.ay += f * b.mass * dy;
                b.ax -= f * a.mass * dx; b.ay -= f * a.mass * dy;
            }
        }
    }
    function step(dt) {
        for (let i = 0; i < bodies.length; i++) {
            const b = bodies[i]; if (!b.alive) continue;
            b.vx += b.ax * dt * .5; b.vy += b.ay * dt * .5;
            b.x += b.vx * dt; b.y += b.vy * dt;
        }
        acc();
        for (let i = 0; i < bodies.length; i++) { const b = bodies[i]; if (!b.alive) continue; b.vx += b.ax * dt * .5; b.vy += b.ay * dt * .5; }
    }
    // Flash + contact tracking
    let flashes = []; // active visual flash events
    let activeContacts = new Set(); // pair keys currently in contact zone

    function collide(stepDt) {
        const newContacts = new Set();
        for (let i = 0; i < bodies.length; i++) { const a = bodies[i]; if (!a.alive) continue;
            for (let j = i + 1; j < bodies.length; j++) { const b = bodies[j]; if (!b.alive) continue;
                const dx = b.x - a.x, dy = b.y - a.y;
                const dSq = dx * dx + dy * dy;
                const touchDist = a.r + b.r;
                // Merge threshold differs by pair type:
                // - Stars have big glow coronas, need deep core overlap (0.4)
                // - Planets are solid — merge when surfaces truly meet (0.85)
                // - Mixed (star + planet): intermediate (0.6)
                const mergeFactor = (a.star && b.star) ? 0.4 : (!a.star && !b.star) ? 0.85 : 0.6;
                const mergeDistSq = (touchDist * mergeFactor) ** 2;

                if (dSq < mergeDistSq) {
                    // MERGE
                    const bothStars = a.star && b.star;
                    const p = a.mass >= b.mass ? a : b, q = a.mass >= b.mass ? b : a, tm = p.mass + q.mass;
                    p.vx = (p.vx * p.mass + q.vx * q.mass) / tm; p.vy = (p.vy * p.mass + q.vy * q.mass) / tm;
                    p.x = (p.x * p.mass + q.x * q.mass) / tm; p.y = (p.y * p.mass + q.y * q.mass) / tm;
                    p.mass = tm;

                    // STELLAR IGNITION: accumulated planet mass crosses stellar threshold
                    // 0.5 = smallest star mass in our sim (brown-dwarf-like boundary)
                    const IGNITION_MASS = 0.5;
                    const justIgnited = !p.star && !q.star && tm >= IGNITION_MASS;

                    p.star = p.star || q.star || justIgnited;
                    p.r = p.star ? BR * Math.cbrt(tm) * STAR_MULT : Math.max(2.5, BR * Math.cbrt(tm) * 3.0);
                    q.alive = false;

                    // Flash on star-star merge OR stellar ignition (dramatic birth)
                    if (bothStars) {
                        flashes.push({
                            x: p.x, y: p.y, maxR: touchDist * 7, life: 0, maxLife: 1.2,
                            color: '255,220,120'
                        });
                    } else if (justIgnited) {
                        // Even more dramatic flash for a newborn star
                        flashes.push({
                            x: p.x, y: p.y, maxR: p.r * 12, life: 0, maxLife: 1.8,
                            color: '255,245,190'
                        });
                    }
                } else if (dSq < touchDist * touchDist && a.star && b.star) {
                    // CONTACT zone — star-star: tidal damping, NO flash
                    const d = Math.sqrt(dSq);
                    const overlap = 1 - d / touchDist;
                    newContacts.add(i < j ? i + '_' + j : j + '_' + i);
                    const rate = 0.35 * overlap;
                    const factor = 1 - rate * (stepDt || 0.016);
                    a.vx *= factor; a.vy *= factor;
                    b.vx *= factor; b.vy *= factor;
                } else if (a.star !== b.star) {
                    // PLANET passing through STAR's corona — mild atmospheric drag
                    const star = a.star ? a : b;
                    const planet = a.star ? b : a;
                    // Only dense part of corona (close to surface), not the full glow halo
                    const coronaR = star.r * 1.8 + planet.r;
                    if (dSq < coronaR * coronaR) {
                        const d = Math.sqrt(dSq);
                        const overlap = 1 - d / coronaR;
                        // Cubic falloff — strong only when very close to surface
                        const rate = 0.25 * overlap * overlap * overlap;
                        const factor = 1 - rate * (stepDt || 0.016);
                        planet.vx *= factor; planet.vy *= factor;
                    }
                }
            }
        }
        activeContacts = newContacts;
    }

    // --- Main loop ---
    function frame(ts) {
        requestAnimationFrame(frame);
        if (!lastT) lastT = ts;
        lastFrame = ts;

        let dt = (ts - lastT) / 1000 * tScale; lastT = ts;
        // Scale sub-steps with speed: more steps at high speed for stability
        const maxStepDt = 0.02; // max physics step size
        const totalSteps = Math.max(SUBS, Math.ceil(dt / maxStepDt));
        const sd = dt / totalSteps;
        for (let i = 0; i < totalSteps; i++) { step(sd); collide(sd); }

        // Auto-camera (manual mode leaves camWorldX/Y frozen at last auto position)
        if (autoCamera) updateAutoCamera(dt);

        // Record trails
        for (let i = 0; i < bodies.length; i++) {
            const b = bodies[i]; if (!b.alive) continue;
            b.trail.unshift(b.x, b.y);
            if (b.trail.length > TLEN * 2) b.trail.length = TLEN * 2;
        }

        // Clear
        X.clearRect(0, 0, C.width, C.height);

        // Trails — BATCHED by color (outer loop = age, inner = bodies)
        // This minimizes fillStyle changes from ~5000/frame to ~50-450/frame
        const z = sScale(), tsz = Math.max(1, 2 * z | 0), halfTsz = tsz / 2;

        // Group alive bodies by type/palette
        const aliveStars = [];
        const planetsByPalette = []; // sparse array, index = palette idx
        for (let i = 0; i < bodies.length; i++) {
            const b = bodies[i]; if (!b.alive) continue;
            if (b.star) aliveStars.push(b);
            else {
                const p = b.palette | 0;
                if (!planetsByPalette[p]) planetsByPalette[p] = [];
                planetsByPalette[p].push(b);
            }
        }

        // Cache last fillStyle to skip redundant sets
        let lastFS = null;

        // Star trails: outer loop by age, inner by star (all share sCol)
        if (aliveStars.length) {
            for (let j = 0; j < TLEN; j++) {
                const color = sCol[j];
                if (color !== lastFS) { X.fillStyle = color; lastFS = color; }
                const jx = j * 2, jy = jx + 1;
                for (let k = 0; k < aliveStars.length; k++) {
                    const tr = aliveStars[k].trail;
                    if (jy >= tr.length) continue;
                    X.fillRect(sx(tr[jx]) - halfTsz, sy(tr[jy]) - halfTsz, tsz, tsz);
                }
            }
        }

        // Planet trails: by palette, then by age (same cache trick)
        for (let p = 0; p < planetsByPalette.length; p++) {
            const planets = planetsByPalette[p];
            if (!planets) continue;
            const col = pTrailCols[p];
            for (let j = 0; j < TLEN; j++) {
                const color = col[j];
                if (color !== lastFS) { X.fillStyle = color; lastFS = color; }
                const jx = j * 2, jy = jx + 1;
                for (let k = 0; k < planets.length; k++) {
                    const tr = planets[k].trail;
                    if (jy >= tr.length) continue;
                    X.fillRect(sx(tr[jx]) - halfTsz, sy(tr[jy]) - halfTsz, tsz, tsz);
                }
            }
        }

        // Bodies
        for (let i = 0; i < bodies.length; i++) {
            const b = bodies[i]; if (!b.alive) continue;
            const sp = spr(b.r, b.star, b.palette);
            const bx = sx(b.x), by = sy(b.y), sc = z;
            const ds = sp._drawSize * sc;
            X.drawImage(sp, bx - ds / 2, by - ds / 2, ds, ds);
        }

        // Flashes — multi-layered shockwaves for star contacts/merges
        for (let i = flashes.length - 1; i >= 0; i--) {
            const f = flashes[i];
            f.life += dt;
            if (f.life >= f.maxLife) { flashes.splice(i, 1); continue; }
            const t = f.life / f.maxLife;
            const cx = sx(f.x), cy = sy(f.y);

            // 1. Initial bright white flash — peaks at start, fades by t=0.4
            const flashA = Math.max(0, Math.pow(1 - t * 2.5, 2));
            if (flashA > 0) {
                const flashR = f.maxR * 0.5 * z;
                const g = X.createRadialGradient(cx, cy, 0, cx, cy, flashR);
                g.addColorStop(0, `rgba(255,255,255,${flashA})`);
                g.addColorStop(0.3, `rgba(${f.color},${flashA * 0.95})`);
                g.addColorStop(0.7, `rgba(${f.color},${flashA * 0.4})`);
                g.addColorStop(1, `rgba(${f.color},0)`);
                X.fillStyle = g;
                X.beginPath();
                X.arc(cx, cy, flashR, 0, 6.283);
                X.fill();
            }

            // 2. Primary shockwave ring — expands fast, thick
            const ringR = f.maxR * t * z;
            const ringA = Math.min(1, Math.pow(1 - t, 1.1) * 2);
            X.strokeStyle = `rgba(${f.color},${ringA})`;
            X.lineWidth = Math.max(3, 14 * (1 - t) * z);
            X.beginPath();
            X.arc(cx, cy, ringR, 0, 6.283);
            X.stroke();

            // 3. Trailing inner ring — depth/detail
            if (t > 0.15) {
                const r2 = f.maxR * (t - 0.15) * z;
                const a2 = Math.pow(1 - t, 1.4) * 0.85;
                X.strokeStyle = `rgba(255,245,210,${a2})`;
                X.lineWidth = Math.max(2, 6 * (1 - t) * z);
                X.beginPath();
                X.arc(cx, cy, r2, 0, 6.283);
                X.stroke();
            }
        }

        // OSD — large centered text, scales with viewport
        if (osd > 0) {
            osd--;
            X.fillStyle = `rgba(255,200,100,${Math.min(1, osd / 15)})`;
            const osdSize = Math.max(48, Math.min(120, C.width * 0.05));
            X.font = `bold ${osdSize}px Segoe UI, Arial, sans-serif`;
            X.textAlign = 'center';
            X.textBaseline = 'middle';
            X.fillText(osdText, C.width / 2, C.height / 2);
        }

        let ac = 0;
        for (let i = 0; i < bodies.length; i++) if (bodies[i].alive) ac++;
        if (ac <= 1 && !restartT) restartT = setTimeout(() => { restartT = null; lastT = 0; init(); }, 10000);
    }

    // --- Menu & start ---
    const menuEl = document.getElementById('menu');
    const sStars = document.getElementById('sStars'), vStars = document.getElementById('vStars');
    const sPlanets = document.getElementById('sPlanets'), vPlanets = document.getElementById('vPlanets');
    // Two-way sync between slider and number input
    function syncPair(slider, number) {
        slider.addEventListener('input', () => number.value = slider.value);
        number.addEventListener('input', () => {
            let v = parseInt(number.value);
            if (isNaN(v)) return;
            v = Math.max(+slider.min, Math.min(+slider.max, v));
            slider.value = v;
        });
        // Clamp + validate on blur
        number.addEventListener('blur', () => {
            let v = parseInt(number.value) || +slider.min;
            v = Math.max(+slider.min, Math.min(+slider.max, v));
            number.value = v;
            slider.value = v;
        });
    }
    syncPair(sStars, vStars);
    syncPair(sPlanets, vPlanets);

    let started = false;
    window.startSim = () => {
        cfg.nStars = +sStars.value;
        cfg.nPlanets = +sPlanets.value;
        menuEl.classList.add('hidden');
        lastT = 0; tScale = 2;
        init();
        if (!started) { started = true; requestAnimationFrame(frame); }
    };

    window.ctl = cmd => {
        if (cmd === 'faster') doFaster();
        if (cmd === 'slower') doSlower();
        if (cmd === 'pause') doPause();
        if (cmd === 'restart') doRestart();
        if (cmd === 'menu') { menuEl.classList.remove('hidden'); tScale = 0; }
        if (cmd === 'fullscreen') toggleFullscreen();
        showBtns();
    };

    // --- Auto-hide buttons after 3s of inactivity ---
    const btnsEl = document.getElementById('btns');
    let btnsTimer = null;
    function showBtns() {
        btnsEl.classList.remove('hidden');
        clearTimeout(btnsTimer);
        btnsTimer = setTimeout(() => btnsEl.classList.add('hidden'), 3000);
    }
    ['mousemove', 'mousedown', 'touchstart', 'touchmove', 'keydown', 'wheel'].forEach(ev => {
        addEventListener(ev, showBtns, { passive: true });
    });
    showBtns();
})();
</script>
</body>
</html>
